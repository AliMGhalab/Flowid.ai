<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" font-family="Calibri, 'Segoe UI', sans-serif">

  <!-- ─── Backgrounds & gradients ──────────────────────────────────────────── -->
  <defs>
    <linearGradient id="brandStripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="cyanGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16A34A"/>
    </marker>
  </defs>

  <!-- White background -->
  <rect width="1600" height="900" fill="#FFFFFF"/>

  <!-- ─── Header band (matching slides) ───────────────────────────────────── -->
  <rect x="0" y="0" width="1600" height="60" fill="#FFFFFF"/>
  <!-- Logo placeholder square -->
  <rect x="40" y="14" width="32" height="32" rx="6" fill="#2563EB"/>
  <text x="56" y="38" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif">F</text>
  <text x="86" y="38" font-size="20" font-weight="700" fill="#0F172A">Flowid</text>
  <text x="160" y="38" font-size="20" font-weight="600" fill="#3B82F6">.ai</text>

  <!-- Blue gradient stripe (signature motif from slides) -->
  <rect x="0" y="60" width="1600" height="10" fill="url(#brandStripe)"/>

  <!-- ─── Title row ───────────────────────────────────────────────────────── -->
  <!-- "04" number badge -->
  <text x="60" y="130" font-size="22" font-weight="400" fill="#94A3B8" font-family="Georgia, 'Times New Roman', serif">04</text>
  <!-- Headline in serif style -->
  <text x="110" y="135" font-size="34" font-weight="700" fill="#2563EB"
        font-family="Georgia, 'Palatino Linotype', 'Book Antiqua', serif">
    Multi-Agent Architecture
  </text>

  <!-- Underline accent below title -->
  <rect x="110" y="148" width="60" height="3" fill="#60A5FA"/>

  <!-- Italic subtitle -->
  <text x="180" y="170" font-size="14" font-style="italic" fill="#64748B" font-family="Calibri, sans-serif">
    Six specialised agents · 12-check validation layer · persistent storage · engineer in the loop
  </text>

  <!-- ─── Input box ───────────────────────────────────────────────────────── -->
  <g id="input">
    <rect x="60" y="200" width="280" height="80" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
    <rect x="60" y="200" width="6" height="80" rx="3" fill="#60A5FA"/>
    <text x="84" y="226" font-size="10" font-weight="700" fill="#3B82F6" letter-spacing="3">INPUT</text>
    <text x="84" y="250" font-size="15" font-weight="700" fill="#0F172A">Engineer fills 1-screen form</text>
    <text x="84" y="270" font-size="11" fill="#64748B">Industry · Fluid · State · Budget · Scale</text>
  </g>

  <!-- Arrow down -->
  <line x1="200" y1="280" x2="200" y2="310" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ─── Planner ─────────────────────────────────────────────────────────── -->
  <g id="planner">
    <rect x="60" y="310" width="280" height="80" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
    <rect x="60" y="310" width="6" height="80" rx="3" fill="#2563EB"/>
    <text x="84" y="336" font-size="10" font-weight="700" fill="#2563EB" letter-spacing="3">AGENT 1</text>
    <text x="84" y="360" font-size="16" font-weight="700" fill="#0F172A" font-family="Georgia, serif">Planner</text>
    <text x="84" y="380" font-size="11" fill="#475569">Determines process parameters · classifies system type</text>
  </g>

  <!-- Distribution arrows -->
  <line x1="200" y1="390" x2="200" y2="420" stroke="#2563EB" stroke-width="2.5"/>
  <line x1="120" y1="420" x2="1380" y2="420" stroke="#2563EB" stroke-width="2.5"/>
  <line x1="200"  y1="420" x2="200"  y2="450" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="500"  y1="420" x2="500"  y2="450" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="800"  y1="420" x2="800"  y2="450" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="1100" y1="420" x2="1100" y2="450" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="1380" y1="420" x2="1380" y2="450" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Parallel execution label -->
  <rect x="555" y="405" width="170" height="22" rx="11" fill="#FFFFFF" stroke="#2563EB" stroke-width="1"/>
  <text x="640" y="421" font-size="10" font-weight="700" fill="#2563EB" text-anchor="middle" letter-spacing="2">PARALLEL EXECUTION</text>

  <!-- ─── 5 parallel agents ───────────────────────────────────────────────── -->
  <!-- BOM Agent -->
  <g id="bom">
    <rect x="60" y="450" width="280" height="120" rx="10" fill="#F8FAFC" stroke="#3B82F6" stroke-width="1.5"/>
    <rect x="60" y="450" width="6" height="120" rx="3" fill="#3B82F6"/>
    <text x="84" y="476" font-size="10" font-weight="700" fill="#3B82F6" letter-spacing="3">AGENT 2</text>
    <text x="84" y="500" font-size="16" font-weight="700" fill="#0F172A" font-family="Georgia, serif">BOM</text>
    <text x="84" y="524" font-size="11" fill="#334155">Malaysian suppliers</text>
    <text x="84" y="542" font-size="11" fill="#64748B">Grundfos · KITZ · ABB</text>
    <text x="84" y="558" font-size="11" fill="#64748B">Endress+Hauser · Yokogawa</text>
  </g>

  <!-- Hydraulics Agent -->
  <g id="hydraulics">
    <rect x="360" y="450" width="280" height="120" rx="10" fill="#F8FAFC" stroke="#8B5CF6" stroke-width="1.5"/>
    <rect x="360" y="450" width="6" height="120" rx="3" fill="#8B5CF6"/>
    <text x="384" y="476" font-size="10" font-weight="700" fill="#8B5CF6" letter-spacing="3">AGENT 3</text>
    <text x="384" y="500" font-size="16" font-weight="700" fill="#0F172A" font-family="Georgia, serif">Hydraulics</text>
    <text x="384" y="524" font-size="11" fill="#334155">NPSH · Reynolds · TDH</text>
    <text x="384" y="542" font-size="11" fill="#64748B">Pump shaft power</text>
    <text x="384" y="558" font-size="11" fill="#64748B">IEC 60034 motor sizing</text>
  </g>

  <!-- HAZOP Agent -->
  <g id="hazop">
    <rect x="660" y="450" width="280" height="120" rx="10" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
    <rect x="660" y="450" width="6" height="120" rx="3" fill="#D97706"/>
    <text x="684" y="476" font-size="10" font-weight="700" fill="#D97706" letter-spacing="3">AGENT 4</text>
    <text x="684" y="500" font-size="16" font-weight="700" fill="#0F172A" font-family="Georgia, serif">HAZOP</text>
    <text x="684" y="524" font-size="11" fill="#334155">Guideword analysis</text>
    <text x="684" y="542" font-size="11" fill="#64748B">NO FLOW · MORE PRESSURE</text>
    <text x="684" y="558" font-size="11" fill="#64748B">LEAK · ELECTRICAL · …</text>
  </g>

  <!-- Cost Agent -->
  <g id="cost">
    <rect x="960" y="450" width="280" height="120" rx="10" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/>
    <rect x="960" y="450" width="6" height="120" rx="3" fill="#16A34A"/>
    <text x="984" y="476" font-size="10" font-weight="700" fill="#16A34A" letter-spacing="3">AGENT 5</text>
    <text x="984" y="500" font-size="16" font-weight="700" fill="#0F172A" font-family="Georgia, serif">Cost</text>
    <text x="984" y="524" font-size="11" fill="#334155">AACE Class 4–5</text>
    <text x="984" y="542" font-size="11" fill="#64748B">Lang Factor Method</text>
    <text x="984" y="558" font-size="11" fill="#64748B">MYR · East-MY premium</text>
  </g>

  <!-- P&ID Agent -->
  <g id="pid">
    <rect x="1260" y="450" width="280" height="120" rx="10" fill="#FDF2F8" stroke="#DB2777" stroke-width="1.5"/>
    <rect x="1260" y="450" width="6" height="120" rx="3" fill="#DB2777"/>
    <text x="1284" y="476" font-size="10" font-weight="700" fill="#DB2777" letter-spacing="3">AGENT 6</text>
    <text x="1284" y="500" font-size="16" font-weight="700" fill="#0F172A" font-family="Georgia, serif">P&amp;ID</text>
    <text x="1284" y="524" font-size="11" fill="#334155">Process flow graph</text>
    <text x="1284" y="542" font-size="11" fill="#64748B">Nodes + edges</text>
    <text x="1284" y="558" font-size="11" fill="#64748B">Mermaid SVG render</text>
  </g>

  <!-- Convergence lines -->
  <line x1="200"  y1="570" x2="200"  y2="600" stroke="#2563EB" stroke-width="2"/>
  <line x1="500"  y1="570" x2="500"  y2="600" stroke="#2563EB" stroke-width="2"/>
  <line x1="800"  y1="570" x2="800"  y2="600" stroke="#2563EB" stroke-width="2"/>
  <line x1="1100" y1="570" x2="1100" y2="600" stroke="#2563EB" stroke-width="2"/>
  <line x1="1380" y1="570" x2="1380" y2="600" stroke="#2563EB" stroke-width="2"/>
  <line x1="120" y1="600" x2="1380" y2="600" stroke="#2563EB" stroke-width="2"/>
  <line x1="800" y1="600" x2="800" y2="630" stroke="#16A34A" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <!-- ─── Validation Layer ─────────────────────────────────────────────────── -->
  <g id="validation">
    <rect x="280" y="630" width="1040" height="110" rx="10" fill="#F0FDF4" stroke="#16A34A" stroke-width="2"/>
    <rect x="280" y="630" width="6" height="110" rx="3" fill="#16A34A"/>
    <text x="304" y="660" font-size="11" font-weight="700" fill="#16A34A" letter-spacing="4">VALIDATION LAYER</text>
    <text x="304" y="690" font-size="20" font-weight="700" fill="#0F172A" font-family="Georgia, serif">12 Server-Side Integrity Checks</text>

    <g font-size="10" fill="#15803D">
      <rect x="304" y="702" width="148" height="22" rx="11" fill="#FFFFFF" stroke="#86EFAC" stroke-width="1"/>
      <text x="378" y="718" text-anchor="middle">Cost = BOM sum</text>

      <rect x="462" y="702" width="148" height="22" rx="11" fill="#FFFFFF" stroke="#86EFAC" stroke-width="1"/>
      <text x="536" y="718" text-anchor="middle">NPSH ≥ 0.6 m</text>

      <rect x="620" y="702" width="148" height="22" rx="11" fill="#FFFFFF" stroke="#86EFAC" stroke-width="1"/>
      <text x="694" y="718" text-anchor="middle">Re re-computed</text>

      <rect x="778" y="702" width="148" height="22" rx="11" fill="#FFFFFF" stroke="#86EFAC" stroke-width="1"/>
      <text x="852" y="718" text-anchor="middle">Motor ≥ shaft (IEC)</text>

      <rect x="936" y="702" width="148" height="22" rx="11" fill="#FFFFFF" stroke="#86EFAC" stroke-width="1"/>
      <text x="1010" y="718" text-anchor="middle">HAZOP coverage</text>

      <rect x="1094" y="702" width="200" height="22" rx="11" fill="#FFFFFF" stroke="#86EFAC" stroke-width="1"/>
      <text x="1194" y="718" text-anchor="middle">Material compatibility · +6 more</text>
    </g>
  </g>

  <!-- Arrow down -->
  <line x1="800" y1="740" x2="800" y2="768" stroke="#16A34A" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <!-- ─── Storage + Output ─────────────────────────────────────────────────── -->
  <g id="storage">
    <rect x="480" y="768" width="320" height="80" rx="10" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.5"/>
    <rect x="480" y="768" width="6" height="80" rx="3" fill="#64748B"/>
    <text x="504" y="794" font-size="10" font-weight="700" fill="#64748B" letter-spacing="3">PERSISTENCE</text>
    <text x="504" y="818" font-size="15" font-weight="700" fill="#0F172A" font-family="Georgia, serif">Firestore Storage</text>
    <text x="504" y="836" font-size="10" fill="#64748B">Not ephemeral — survives sessions, users, devices</text>
  </g>

  <line x1="800" y1="808" x2="855" y2="808" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrow)"/>

  <g id="engineerOut">
    <rect x="860" y="768" width="340" height="80" rx="10" fill="#EFF6FF" stroke="#2563EB" stroke-width="2"/>
    <rect x="860" y="768" width="6" height="80" rx="3" fill="#2563EB"/>
    <text x="884" y="794" font-size="10" font-weight="700" fill="#2563EB" letter-spacing="3">ENGINEER WORKFLOW</text>
    <text x="884" y="818" font-size="15" font-weight="700" fill="#0F172A" font-family="Georgia, serif">PE Review &amp; Stamp</text>
    <text x="884" y="836" font-size="10" fill="#475569">PE keeps engineering judgement — AI removes documentation work</text>
  </g>

  <!-- ─── Sidebar — Decision logic ─────────────────────────────────────────── -->
  <g id="sidebar">
    <rect x="60" y="768" width="400" height="80" rx="10" fill="#FAF5FF" stroke="#A855F7" stroke-width="1.5"/>
    <rect x="60" y="768" width="6" height="80" rx="3" fill="#8B5CF6"/>
    <text x="84" y="794" font-size="10" font-weight="700" fill="#7C3AED" letter-spacing="3">AI FALLBACK CHAIN — DECISION LOGIC</text>
    <text x="84" y="816" font-size="12" font-weight="700" fill="#0F172A">Cerebras Qwen 235B  →  Mistral Medium  →  SambaNova Llama 3.3</text>
    <text x="84" y="834" font-size="10" fill="#7C3AED" font-style="italic">If 429 / 5xx / timeout → skip to next provider · 35s max per attempt</text>
  </g>

  <!-- Footer -->
  <text x="60" y="880" font-size="11" fill="#94A3B8" font-style="italic">
    Decision Logic — Validation auto-corrects (cost reconciled · math overridden · flow regime relabelled) and surfaces findings to the engineer as visible warnings, never silenced.
  </text>

</svg>
